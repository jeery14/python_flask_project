{% extends 'base.html' %}

{% block content %}

<h2 class="text-center mb-4">🛒 Available Products</h2>

<div class="row">

{% for product in products %}
<div class="col-md-4">
    <div class="card shadow p-3 mb-4">

        <img src="https://via.placeholder.com/300" class="card-img-top">

        <div class="card-body text-center">
            <h5>{{ product[1] }}</h5>
            <p class="text-success fw-bold">₹{{ product[2] }}</p>
            <button class="btn btn-primary">Buy Now</button>
        </div>

    </div>
</div>
{% endfor %}

</div>

{% endblock %}
