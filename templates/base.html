<!DOCTYPE html>
<html>
<head>
    <title>Agriculture Marketplace</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7f2;
        }
        .navbar {
            background-color: #2e7d32 !important;
        }
        .hero {
            background: linear-gradient(to right, #4CAF50, #66BB6A);
            color: white;
            padding: 60px;
            border-radius: 10px;
            text-align: center;
        }
        footer {
            background-color: #2e7d32;
            color: white;
            padding: 15px;
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">🌾 AgriMarket</a>

    <div>
      <a href="/" class="btn btn-light btn-sm">Home</a>
      <a href="/add" class="btn btn-warning btn-sm">Add Product</a>
      <a href="/products" class="btn btn-info btn-sm">Products</a>
    </div>
  </div>
</nav>

<div class="container mt-4">

    {% block content %}{% endblock %}

</div>

<!-- Footer -->
<footer>
    <p>© 2026 Agriculture Marketplace | Built with Flask 🌱</p>
</footer>

</body>
</html>
